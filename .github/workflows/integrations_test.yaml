name: Mistral Common Integrations CI

permissions:
  contents: read

on:
  push:
    branches:
      - main
    paths:
      - 'integrations/**'
      - 'tests/integrations/**'
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
    paths:
      - 'integrations/**'
      - 'tests/integrations/**'
    
jobs:
  chat_templates:
    if: ${{ github.event.pull_request.draft != true }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955 # v4

      - name: Install uv
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5
        with:
          python-version: 3.13

      # Install
      - name: Install Dependencies
        run: |
          uv sync --frozen --all-extras --group dev
          uv pip install transformers regex>=2025.10.22

      # PyTest
      - name: Tests
        run: |
          uv run pytest integrations/tests/
